"""
Docker Compose Configuration

Development environment setup with FastAPI, PostgreSQL, and Redis.
For production, use Kubernetes or cloud provider orchestration.

Usage:
    docker-compose up -d      Build and start services
    docker-compose down       Stop all services
    docker-compose logs -f    Tail logs
"""

version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: skitec_db
    environment:
      POSTGRES_USER: ${DB_USER:-skitec_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-skitec_password}
      POSTGRES_DB: ${DB_NAME:-skitec_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skitec_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Queue
  redis:
    image: redis:7-alpine
    container_name: skitec_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build: .
    container_name: skitec_api
    command: |
      sh -c "pip install -r requirements.txt && 
             alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://skitec_user:skitec_password@db:5432/skitec_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # pgAdmin - PostgreSQL Web UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skitec_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skitec.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: skitec_network
